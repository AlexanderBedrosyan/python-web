{% extends 'base.html' %}

{% block content %}
<main>
        <!-- Create Author's Profile Form (Only if no author's profile has been created) -->
        <section id="register">
            <div class="form">
                <h2>Create Author's Profile</h2>

                <form class="register-form" method="POST" action="">
                    {% csrf_token %}
                    {% for current_form in form %}
                        {{ current_form.errors }}
                        {{ current_form.label_tag }}
                        <div class="helptext" id="id_passcode_helptext">{{ current_form.help_text }}</div>
                        {{ current_form }}
                    {% endfor %}

                    <!-- form button -->
                    <button type="submit">Create</button>
                </form>
            </div>
        </section>
    </main>
{% endblock %}
